<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Admin - Javitron</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #0a0414;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: #ff6b35;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
        }
        button:hover {
            background: #f7931e;
        }
        #result {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid green;
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
        }
    </style>
</head>
<body>
    <h1>Make User Admin</h1>
    <p>Enter email address to make that user an admin.</p>
    <input type="email" id="emailInput" placeholder="Enter email address" value="kbrajesh5688@gmail.com">
    <button id="makeAdminBtn">Click to make admin</button>
    <div id="result"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        document.getElementById('makeAdminBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const resultDiv = document.getElementById('result');
            const button = document.getElementById('makeAdminBtn');

            if (!email) {
                resultDiv.innerHTML = '<p class="error">Please enter an email address</p>';
                return;
            }

            try {
                button.disabled = true;
                button.textContent = 'Processing...';
                resultDiv.innerHTML = '<p>Searching for user...</p>';

                // Query users collection to find the user by email
                const snapshot = await firebase.firestore().collection('users').where('email', '==', email).get();

                if (snapshot.empty) {
                    resultDiv.innerHTML = `<p class="error">User not found with email: ${email}</p>`;
                    resultDiv.innerHTML += '<p style="margin-top: 10px;">Make sure you have logged in at least once to create your profile.</p>';
                    button.disabled = false;
                    button.textContent = 'Click to make admin';
                    return;
                }

                let userId = null;
                snapshot.forEach((doc) => {
                    userId = doc.id;
                });

                resultDiv.innerHTML = `<p>Found user with email: ${email}</p>`;
                resultDiv.innerHTML += '<p>Updating user role to admin...</p>';

                // Update user role to admin
                await firebase.firestore().collection('users').doc(userId).update({
                    role: 'admin',
                    teamRole: 'admin'
                });

                resultDiv.innerHTML = '<p class="success">Successfully made user an admin!</p>';
                resultDiv.innerHTML += '<p style="margin-top: 10px;">User can now access the <a href="admin.html">Admin Panel</a></p>';
                resultDiv.innerHTML += '<p style="margin-top: 10px;">Please logout and login again for changes to take effect.</p>';
                button.textContent = 'Done!';

                console.log('Admin created successfully for:', email);

            } catch (error) {
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
                console.error('Error making admin:', error);
                button.disabled = false;
                button.textContent = 'Click to make admin';
            }
        });
    </script>
</body>
</html>
