<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Admin - Javitron</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #0a0414;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: #ff6b35;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background: #ff6b35;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
        }
        button:hover {
            background: #f7931e;
        }
        #result {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid green;
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
        }
    </style>
</head>
<body>
    <h1>Make Current User Admin</h1>
    <p>This will make your current logged-in account an admin.</p>
    <button id="makeAdminBtn">Click to make yourself admin</button>
    <div id="result"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        document.getElementById('makeAdminBtn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            const button = document.getElementById('makeAdminBtn');

            try {
                button.disabled = true;
                button.textContent = 'Processing...';
                resultDiv.innerHTML = '<p>Checking authentication...</p>';

                // Check if user is logged in
                const user = firebase.auth().currentUser;
                if (!user) {
                    resultDiv.innerHTML = '<p class="error">Please login first at <a href="login.html">login.html</a></p>';
                    button.disabled = false;
                    button.textContent = 'Click to make yourself admin';
                    return;
                }

                resultDiv.innerHTML = `<p>Found logged-in user: ${user.email}</p>`;
                resultDiv.innerHTML += '<p>Updating user role to admin...</p>';

                // Update user role to admin in Firestore
                await firebase.firestore().collection('users').doc(user.uid).update({
                    role: 'admin',
                    teamRole: 'admin'
                });

                resultDiv.innerHTML = '<p class="success">Successfully made you an admin!</p>';
                resultDiv.innerHTML += '<p style="margin-top: 10px;">You can now access the <a href="admin.html">Admin Panel</a></p>';
                button.textContent = 'Done!';

                console.log('Admin created successfully for:', user.email);

            } catch (error) {
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
                console.error('Error making admin:', error);
                button.disabled = false;
                button.textContent = 'Click to make yourself admin';
            }
        });
    </script>
</body>
</html>
