<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login | JAVITRON Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0a;
            overflow-x: hidden;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .auth-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(200, 16, 46, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(200, 16, 46, 0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Grid Pattern Overlay */
        .auth-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(200, 16, 46, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 100;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Red Accent Glow */
        .auth-box::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, 
                rgba(200, 16, 46, 0.3) 0%, 
                transparent 50%, 
                rgba(200, 16, 46, 0.1) 100%);
            border-radius: 26px;
            z-index: -1;
            opacity: 0.5;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(200, 16, 46, 0.5);
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            letter-spacing: 0.05em;
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .auth-tab {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-bottom: 2px solid transparent;
            position: relative;
        }

        .auth-tab.active {
            color: #c8102e;
            border-bottom-color: #c8102e;
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #c8102e;
            box-shadow: 0 0 20px rgba(200, 16, 46, 0.5);
        }

        .auth-tab:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-group input:focus {
            outline: none;
            border-color: #c8102e;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(200, 16, 46, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #c8102e 0%, #ff3c5f 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 1rem;
            z-index: 10;
            position: relative;
            pointer-events: auto;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 20px rgba(200, 16, 46, 0.3);
        }

        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(200, 16, 46, 0.5);
        }

        .btn-auth:active {
            transform: translateY(-1px);
        }

        .btn-google {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .auth-divider {
            text-align: center;
            margin: 1.5rem 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            display: inline-block;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            vertical-align: middle;
            margin: 0 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .auth-footer a {
            color: #c8102e;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 500;
        }

        .auth-footer a:hover {
            color: #ff3c5f;
            text-shadow: 0 0 20px rgba(200, 16, 46, 0.5);
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 12px;
            padding: 1rem;
            color: #ff6b6b;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            animation: shake 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 12px;
            padding: 1rem;
            color: #6bff6b;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Custom Cursor */
        .cursor {
            width: 12px;
            height: 12px;
            background: #c8102e;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease;
            box-shadow: 0 0 20px rgba(200, 16, 46, 0.5);
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(200, 16, 46, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem;
            }

            .auth-box {
                padding: 2rem;
                max-width: 100%;
                margin: 1rem;
            }

            .auth-header h1 {
                font-size: 2rem;
            }

            .auth-header p {
                font-size: 0.9rem;
            }

            .auth-tabs {
                flex-direction: row;
                gap: 0.5rem;
            }

            .auth-tab {
                flex: 1;
                font-size: 0.85rem;
                padding: 0.75rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.9rem;
                padding: 0.75rem;
            }

            .btn-auth {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .google-auth-btn {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .profile-actions {
                flex-direction: column;
                gap: 0.5rem;
            }

            .profile-actions button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 1.5rem;
                margin: 0.5rem;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .auth-header p {
                font-size: 0.8rem;
            }

            .auth-tab {
                font-size: 0.75rem;
                padding: 0.5rem;
            }

            .form-group label {
                font-size: 0.75rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.85rem;
                padding: 0.6rem;
            }

            .btn-auth {
                padding: 0.6rem;
                font-size: 0.85rem;
            }

            .google-auth-btn {
                padding: 0.6rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 360px) {
            .auth-header h1 {
                font-size: 1.25rem;
            }

            .auth-tab {
                font-size: 0.7rem;
                padding: 0.4rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.8rem;
                padding: 0.5rem;
            }

            .btn-auth {
                padding: 0.5rem;
                font-size: 0.8rem;
            }
        }

        /* Large screens */
        @media (min-width: 1200px) {
            .auth-container {
                padding: 3rem;
            }

            .auth-box {
                max-width: 500px;
                padding: 3.5rem;
            }

            .auth-header h1 {
                font-size: 3rem;
            }

            .auth-header p {
                font-size: 1.1rem;
            }

            .form-group label {
                font-size: 1rem;
            }

            .form-group input,
            .form-group select {
                font-size: 1.1rem;
                padding: 1rem;
            }

            .btn-auth {
                padding: 1rem;
                font-size: 1.1rem;
            }
        }

        /* Extra large screens */
        @media (min-width: 1400px) {
            .auth-box {
                max-width: 550px;
                padding: 4rem;
            }
        }

        /* Fluid typography for better scaling */
        @media (min-width: 768px) and (max-width: 1199px) {
            .auth-header h1 {
                font-size: clamp(1.75rem, 4vw, 2.5rem);
            }

            .auth-box {
                padding: clamp(2rem, 5vw, 3rem);
            }
        }

        /* Mesh Canvas */
        #meshCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="meshCanvas"></canvas>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>JAVITRON</h1>
                <p>Team Racing Portal</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Login</button>
                <button class="auth-tab" id="registerTab">Register</button>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- Login Form -->
            <form id="loginForm" style="position: relative; z-index: 10;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Login</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display: none; position: relative; z-index: 10;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="registerName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Team Code (Required for Team Members)</label>
                    <input type="text" id="teamCode" placeholder="Enter team verification code" required>
                    <small style="color: rgba(255, 255, 255, 0.4); font-size: 0.8rem;">Only team members can register with the team code</small>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Register</button>
            </form>

            <div class="auth-divider">or continue with</div>

            <button class="btn-google" id="googleAuthBtn">
                <i class="fab fa-google"></i>
                Google
            </button>

            <div class="auth-footer">
                <a href="index.html">← Back to Website</a>
            </div>
        </div>
    </div>

    <!-- CURSOR -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <!-- Firebase SDK - Modular -->
    <script type="module" src="auth.js"></script>
    <script src="script.js"></script>

    <!-- Mesh Effect Script -->
    <script>
        const canvas = document.getElementById('meshCanvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        
        class Particle {
            constructor(x, y, textX, textY) {
                this.x = x;
                this.y = y;
                this.textX = textX;
                this.textY = textY;
                this.size = 2;
                this.baseX = x;
                this.baseY = y;
                this.density = (Math.random() * 30) + 1;
                this.color = `rgba(200, 16, 46, ${Math.random() * 0.5 + 0.3})`;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;
                
                if (distance < mouse.radius) {
                    this.x -= directionX * 3;
                    this.y -= directionY * 3;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 10;
                    }
                }
            }
        }
        
        function initParticles() {
            particles = [];
            
            // Create text particles
            ctx.font = 'bold 150px Bebas Neue';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const text = 'JAVITRON';
            const textX = canvas.width / 2;
            const textY = canvas.height / 2;
            
            ctx.fillText(text, textX, textY);
            
            const textCoordinates = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0, y2 = textCoordinates.height; y < y2; y += 4) {
                for (let x = 0, x2 = textCoordinates.width; x < x2; x += 4) {
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        let positionX = x;
                        let positionY = y;
                        particles.push(new Particle(positionX, positionY, positionX, positionY));
                    }
                }
            }
        }
        
        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 50) {
                        ctx.strokeStyle = `rgba(200, 16, 46, ${0.2 - distance / 250})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].draw();
                particles[i].update();
            }
            
            connect();
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', resizeCanvas);
        
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });
        
        resizeCanvas();
        animate();
    </script>
</body>
</html>
