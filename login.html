<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login | JAVITRON Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            padding: 2rem;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 100;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-tab {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .auth-tab.active {
            color: #fff;
            border-bottom-color: #ff6b35;
        }

        .auth-tab:hover {
            color: #fff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6b35;
            background: rgba(255, 255, 255, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            z-index: 10;
            position: relative;
            pointer-events: auto;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }

        .btn-google {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .auth-divider {
            text-align: center;
            margin: 1.5rem 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            display: inline-block;
            width: 100px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            vertical-align: middle;
            margin: 0 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .auth-footer a {
            color: #ff6b35;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .auth-footer a:hover {
            color: #f7931e;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1rem;
            color: #ff6b6b;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 10px;
            padding: 1rem;
            color: #6bff6b;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Custom Cursor */
        .cursor {
            width: 12px;
            height: 12px;
            background: #ff6b35;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease;
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem;
            }

            .auth-box {
                padding: 2rem;
                max-width: 100%;
                margin: 1rem;
            }

            .auth-header h1 {
                font-size: 2rem;
            }

            .auth-header p {
                font-size: 0.9rem;
            }

            .auth-tabs {
                flex-direction: row;
                gap: 0.5rem;
            }

            .auth-tab {
                flex: 1;
                font-size: 0.85rem;
                padding: 0.75rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.9rem;
                padding: 0.75rem;
            }

            .btn-auth {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .google-auth-btn {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .profile-actions {
                flex-direction: column;
                gap: 0.5rem;
            }

            .profile-actions button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 1.5rem;
                margin: 0.5rem;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .auth-header p {
                font-size: 0.8rem;
            }

            .auth-tab {
                font-size: 0.75rem;
                padding: 0.5rem;
            }

            .form-group label {
                font-size: 0.75rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.85rem;
                padding: 0.6rem;
            }

            .btn-auth {
                padding: 0.6rem;
                font-size: 0.85rem;
            }

            .google-auth-btn {
                padding: 0.6rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 360px) {
            .auth-header h1 {
                font-size: 1.25rem;
            }

            .auth-tab {
                font-size: 0.7rem;
                padding: 0.4rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.8rem;
                padding: 0.5rem;
            }

            .btn-auth {
                padding: 0.5rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>JAVITRON</h1>
                <p>Team Racing Portal</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Login</button>
                <button class="auth-tab" id="registerTab">Register</button>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- Login Form -->
            <form id="loginForm" style="position: relative; z-index: 10;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Login</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display: none; position: relative; z-index: 10;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="registerName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Team Code (Required for Team Members)</label>
                    <input type="text" id="teamCode" placeholder="Enter team verification code" required>
                    <small style="color: rgba(255, 255, 255, 0.4); font-size: 0.8rem;">Only team members can register with the team code</small>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Register</button>
            </form>

            <div class="auth-divider">or continue with</div>

            <button class="btn-google" id="googleAuthBtn">
                <i class="fab fa-google"></i>
                Google
            </button>

            <div class="auth-footer">
                <a href="index.html">← Back to Website</a>
            </div>
        </div>
    </div>

    <!-- CURSOR -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <!-- Firebase SDK - Modular -->
    <script type="module" src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
