<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel | JAVITRON Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-dark: #0a0414;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --bg-glass-hover: rgba(255, 255, 255, 0.08);
            --accent: #c8102e;
            --accent-cyan: #00c8ff;
            --text-light: #f0f0f0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-hover: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(10, 4, 20, 0.4);
            --glass-shadow-hover: 0 12px 48px rgba(200, 16, 46, 0.25);
            --transition-fast: 0.2s ease;
        }

        .admin-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0414 0%, #1a0a2e 50%, #0a0414 100%);
            padding: 2rem;
            position: relative;
        }

        .admin-container::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 20%, rgba(200, 16, 46, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 200, 255, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            position: relative;
            z-index: 1;
        }

        .admin-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            letter-spacing: 0.1em;
            text-shadow: 0 0 40px rgba(200, 16, 46, 0.3);
        }

        .admin-header-actions {
            display: flex;
            gap: 0.8rem;
        }

        .admin-header-actions button {
            background: var(--bg-glass);
            color: var(--text-light);
            border: 1px solid var(--glass-border);
            padding: 0.7rem 1.4rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-header-actions button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .admin-header-actions button:hover {
            background: var(--bg-glass-hover);
            transform: translateY(-3px);
            border-color: var(--glass-border-hover);
            box-shadow: var(--glass-shadow-hover);
        }

        .btn-profile {
            border-color: rgba(0, 200, 255, 0.4);
        }

        .btn-profile:hover {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.2) 0%, rgba(0, 200, 255, 0.05) 100%);
            border-color: var(--accent-cyan);
            box-shadow: 0 8px 24px rgba(0, 200, 255, 0.25);
        }

        .btn-logout {
            border-color: rgba(200, 16, 46, 0.5);
        }

        .btn-logout:hover {
            background: linear-gradient(135deg, rgba(200, 16, 46, 0.3) 0%, rgba(200, 16, 46, 0.1) 100%);
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(200, 16, 46, 0.3);
            transform: translateY(-2px);
        }

        .admin-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .admin-section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .admin-section h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #fff;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ff6b35;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-generate {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }

        .code-display {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }

        .code-display.active {
            display: block;
        }

        .code-display h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.5rem;
        }

        .code-display .code {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            color: #ff6b35;
            font-weight: bold;
            letter-spacing: 0.2em;
        }

        .code-display .copy-btn {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .code-display .copy-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .codes-list {
            margin-top: 2rem;
        }

        .code-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-item .code-info {
            flex: 1;
        }

        .code-item .code-info h4 {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .code-item .code-info p {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        .code-item .code-status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .code-item .code-status.active {
            background: rgba(0, 255, 0, 0.2);
            color: #6bff6b;
        }

        .code-item .code-status.used {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
        }

        .members-list {
            margin-top: 2rem;
        }

        .member-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .member-info {
            flex: 1;
            min-width: 200px;
        }

        .member-info h4 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .member-info p {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.3rem;
        }

        .member-info .member-role {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid rgba(255, 107, 53, 0.5);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #ff6b35;
            margin-top: 0.5rem;
        }

        .member-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .member-actions button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit-member {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-edit-member:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-remove-member {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: #fff;
        }

        .btn-remove-member:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
        }

        .edit-member-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .edit-member-modal.active {
            display: flex;
        }

        .edit-member-form {
            background: #1a0a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
        }

        .edit-member-form h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 1.5rem;
        }

        .edit-member-form .form-group {
            margin-bottom: 1rem;
        }

        .edit-member-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .edit-member-form input,
        .edit-member-form select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
        }

        .edit-member-form select option {
            background: #1a0a2e;
            color: #fff;
        }

        .edit-member-form .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .edit-member-form .form-actions button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save-member {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-cancel-edit {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-cancel-edit:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Outfit', sans-serif;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1rem;
            color: #ff6b6b;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        /* Custom Cursor */
        .cursor {
            width: 12px;
            height: 12px;
            background: #ff6b35;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease;
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 1rem;
            }

            .admin-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
                padding: 1.5rem;
            }

            .admin-header h1 {
                font-size: 2rem;
            }

            .btn-logout {
                padding: 0.6rem 1.25rem;
                font-size: 0.85rem;
            }

            .admin-content {
                padding: 0;
            }

            .admin-section {
                padding: 1.5rem;
                border-radius: 15px;
            }

            .admin-section h2 {
                font-size: 1.5rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            .form-group input,
            .form-group select {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .btn-generate {
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }

            .code-display {
                padding: 1rem;
            }

            .code-display h3 {
                font-size: 0.85rem;
            }

            .code-display .code {
                font-size: 1.25rem;
            }

            .code-display .copy-btn {
                padding: 0.5rem 0.75rem;
                font-size: 0.85rem;
            }

            .code-item {
                padding: 0.75rem;
            }

            .code-item .code-info h4 {
                font-size: 0.9rem;
            }

            .code-item .code-info p {
                font-size: 0.8rem;
            }

            .code-item .code-status {
                padding: 0.4rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .admin-header {
                padding: 1rem;
            }

            .admin-header h1 {
                font-size: 1.5rem;
            }

            .btn-logout {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }

            .admin-section {
                padding: 1rem;
            }

            .admin-section h2 {
                font-size: 1.25rem;
            }

            .form-group label {
                font-size: 0.8rem;
            }

            .form-group input,
            .form-group select {
                padding: 0.6rem;
                font-size: 0.85rem;
            }

            .btn-generate {
                padding: 0.6rem 1.25rem;
                font-size: 0.85rem;
            }

            .code-display {
                padding: 0.75rem;
            }

            .code-display .code {
                font-size: 1rem;
            }

            .code-item {
                padding: 0.5rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .code-item .code-status {
                align-self: flex-start;
            }
        }

        @media (max-width: 360px) {
            .admin-header h1 {
                font-size: 1.25rem;
            }

            .admin-section h2 {
                font-size: 1rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.8rem;
            }

            .code-display .code {
                font-size: 0.9rem;
            }
        }

        /* Large screens */
        @media (min-width: 1200px) {
            .admin-container {
                padding: 3rem;
            }

            .admin-content {
                max-width: 1400px;
            }

            .admin-section {
                padding: 2.5rem;
            }

            .admin-header h1 {
                font-size: 4rem;
            }

            .admin-section h2 {
                font-size: 2rem;
            }

            .form-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Extra large screens */
        @media (min-width: 1400px) {
            .admin-content {
                max-width: 1600px;
            }

            .codes-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Fluid typography for better scaling */
        @media (min-width: 768px) and (max-width: 1199px) {
            .admin-header h1 {
                font-size: clamp(2rem, 5vw, 3rem);
            }

            .admin-section h2 {
                font-size: clamp(1.25rem, 3vw, 1.75rem);
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Panel</h1>
            <div class="admin-header-actions">
                <button class="btn-profile" id="goToProfileBtn">
                    <i class="fas fa-user"></i> Profile
                </button>
                <button class="btn-logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div class="admin-content">
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading admin panel...
            </div>

            <div id="adminContent" style="display: none;">
                <div class="error-message" id="errorMessage"></div>

                <div class="admin-section">
                    <h2>Generate Team Code</h2>
                    <form id="generateCodeForm">
                        <div class="form-group">
                            <label>Team Member Name</label>
                            <input type="text" id="memberName" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select id="memberRole" required>
                                <option value="member">Team Member</option>
                                <option value="lead">Team Lead</option>
                                <option value="vice-captain">Vice Captain</option>
                                <option value="captain">Captain</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <select id="memberDepartment" required>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Software">Software</option>
                                <option value="Design">Design</option>
                                <option value="Management">Management</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-generate">
                            <i class="fas fa-key"></i> Generate Team Code
                        </button>
                    </form>

                    <div class="code-display" id="codeDisplay">
                        <h3>Team Code Generated:</h3>
                        <div class="code" id="generatedCode">JAVITRON-XXXXX</div>
                        <button class="copy-btn" id="copyCodeBtn">
                            <i class="fas fa-copy"></i> Copy Code
                        </button>
                    </div>
                </div>

                <div class="admin-section">
                    <h2>Remove Team Member</h2>
                    <form id="removeMemberForm">
                        <div class="form-group">
                            <label>Member Email</label>
                            <input type="email" id="removeMemberEmail" placeholder="member@example.com" required>
                        </div>
                        <button type="submit" class="btn-generate" style="background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);">Remove Member</button>
                    </form>
                    <div id="removeMemberResult" style="margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none;"></div>
                </div>

                <div class="admin-section">
                    <h2>Team Members</h2>
                    <div class="members-list" id="membersList">
                        <!-- Members will be loaded here -->
                    </div>
                </div>

                <div class="admin-section">
                    <h2>Team Codes</h2>
                    <div class="codes-list" id="codesList">
                        <!-- Codes will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Member Modal -->
    <div class="edit-member-modal" id="editMemberModal">
        <div class="edit-member-form">
            <h3>Edit Member</h3>
            <form id="editMemberForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="editMemberName" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="editMemberRole" required>
                        <option value="member">Team Member</option>
                        <option value="lead">Team Lead</option>
                        <option value="vice-captain">Vice Captain</option>
                        <option value="captain">Captain</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="editMemberDepartment" required>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Software">Software</option>
                        <option value="Design">Design</option>
                        <option value="Management">Management</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel-edit" id="cancelEditMember">Cancel</button>
                    <button type="submit" class="btn-save-member">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CURSOR -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <!-- Firebase SDK - Modular -->
    <script type="module" src="admin.js"></script>
    <script src="script.js"></script>
</body>
</html>
