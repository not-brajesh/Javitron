<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Panel | JAVITRON Racing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            padding: 2rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .admin-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: #fff;
            margin: 0;
        }

        .admin-header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-profile {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid rgba(255, 107, 53, 0.5);
            border-radius: 10px;
            color: #ff6b35;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-profile:hover {
            background: rgba(255, 107, 53, 0.3);
            transform: translateY(-2px);
        }

        .btn-logout {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid rgba(255, 107, 53, 0.5);
            border-radius: 10px;
            color: #ff6b35;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(255, 107, 53, 0.3);
            transform: translateY(-2px);
        }

        .admin-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .admin-section h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #fff;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ff6b35;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-generate {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }

        .code-display {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }

        .code-display.active {
            display: block;
        }

        .code-display h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.5rem;
        }

        .code-display .code {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            color: #ff6b35;
            font-weight: bold;
            letter-spacing: 0.2em;
        }

        .code-display .copy-btn {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .code-display .copy-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .codes-list {
            margin-top: 2rem;
        }

        .code-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-item .code-info {
            flex: 1;
        }

        .code-item .code-info h4 {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .code-item .code-info p {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        .code-item .code-status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .code-item .code-status.active {
            background: rgba(0, 255, 0, 0.2);
            color: #6bff6b;
        }

        .code-item .code-status.used {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Outfit', sans-serif;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1rem;
            color: #ff6b6b;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        /* Custom Cursor */
        .cursor {
            width: 12px;
            height: 12px;
            background: #ff6b35;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease;
        }

        .cursor-follower {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 1rem;
            }

            .admin-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
                padding: 1.5rem;
            }

            .admin-header h1 {
                font-size: 2rem;
            }

            .btn-logout {
                padding: 0.6rem 1.25rem;
                font-size: 0.85rem;
            }

            .admin-content {
                padding: 0;
            }

            .admin-section {
                padding: 1.5rem;
                border-radius: 15px;
            }

            .admin-section h2 {
                font-size: 1.5rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            .form-group input,
            .form-group select {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .btn-generate {
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }

            .code-display {
                padding: 1rem;
            }

            .code-display h3 {
                font-size: 0.85rem;
            }

            .code-display .code {
                font-size: 1.25rem;
            }

            .code-display .copy-btn {
                padding: 0.5rem 0.75rem;
                font-size: 0.85rem;
            }

            .code-item {
                padding: 0.75rem;
            }

            .code-item .code-info h4 {
                font-size: 0.9rem;
            }

            .code-item .code-info p {
                font-size: 0.8rem;
            }

            .code-item .code-status {
                padding: 0.4rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .admin-header {
                padding: 1rem;
            }

            .admin-header h1 {
                font-size: 1.5rem;
            }

            .btn-logout {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }

            .admin-section {
                padding: 1rem;
            }

            .admin-section h2 {
                font-size: 1.25rem;
            }

            .form-group label {
                font-size: 0.8rem;
            }

            .form-group input,
            .form-group select {
                padding: 0.6rem;
                font-size: 0.85rem;
            }

            .btn-generate {
                padding: 0.6rem 1.25rem;
                font-size: 0.85rem;
            }

            .code-display {
                padding: 0.75rem;
            }

            .code-display .code {
                font-size: 1rem;
            }

            .code-item {
                padding: 0.5rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .code-item .code-status {
                align-self: flex-start;
            }
        }

        @media (max-width: 360px) {
            .admin-header h1 {
                font-size: 1.25rem;
            }

            .admin-section h2 {
                font-size: 1rem;
            }

            .form-group input,
            .form-group select {
                font-size: 0.8rem;
            }

            .code-display .code {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Panel</h1>
            <div class="admin-header-actions">
                <button class="btn-profile" id="goToProfileBtn">
                    <i class="fas fa-user"></i> Profile
                </button>
                <button class="btn-logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div class="admin-content">
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading admin panel...
            </div>

            <div id="adminContent" style="display: none;">
                <div class="error-message" id="errorMessage"></div>

                <div class="admin-section">
                    <h2>Generate Team Code</h2>
                    <form id="generateCodeForm">
                        <div class="form-group">
                            <label>Team Member Name</label>
                            <input type="text" id="memberName" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select id="memberRole" required>
                                <option value="member">Team Member</option>
                                <option value="lead">Team Lead</option>
                                <option value="captain">Captain</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <select id="memberDepartment" required>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Software">Software</option>
                                <option value="Design">Design</option>
                                <option value="Management">Management</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-generate">
                            <i class="fas fa-key"></i> Generate Team Code
                        </button>
                    </form>

                    <div class="code-display" id="codeDisplay">
                        <h3>Team Code Generated:</h3>
                        <div class="code" id="generatedCode">JAVITRON-XXXXX</div>
                        <button class="copy-btn" id="copyCodeBtn">
                            <i class="fas fa-copy"></i> Copy Code
                        </button>
                    </div>
                </div>

                <div class="admin-section">
                    <h2>Team Codes</h2>
                    <div class="codes-list" id="codesList">
                        <!-- Codes will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CURSOR -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <!-- Firebase SDK - Modular -->
    <script type="module" src="admin.js"></script>
    <script src="script.js"></script>
</body>
</html>
